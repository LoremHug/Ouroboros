name: Build and deploy map to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "manifold_graph.txt"
      - "THE_IMPEDANCE_MANIFOLD_v3_6.tex"
      - "additions.yaml"
      - "schema/**"
      - "scripts/**"
      - "web/.nojekyll"
      - "requirements.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Build database (migrate)
        run: python -m scripts.migrate

      - name: Enrich with .tex sections
        run: python -m scripts.enrich_from_tex

      - name: Generate map
        run: python -m scripts.generate_map

      - name: Verify output
        run: |
          test -f web/index.html || { echo "ERROR: web/index.html missing"; exit 1; }
          test -f web/.nojekyll || { echo "ERROR: web/.nojekyll missing"; exit 1; }
          ls -la web/
          wc -c web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
