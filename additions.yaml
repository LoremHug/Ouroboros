        - No separation within cognition
        - No separation within mathematics
        - No separation BETWEEN physics and cognition
        - No separation BETWEEN map and territory
        - No separation BETWEEN observer and observed
        - No separation BETWEEN framework and reality
        - No separation BETWEEN A_0 and any of its substrate readings
