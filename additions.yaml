nodes:
  - id: N165
    title: Ergodicity of the Reality Protocol
    layer: structure
    status: DEMONSTRATED
    anchors: 3
    a_infinity: false
    is_placeholder: false
    summary: |
      Reality Protocol is an ergodic Markov chain on the Z-graph. The chain
      converges to a unique stationary distribution (Gibbs state) uniform on
      each Z3-orbit. Single result simultaneously closes three previously
      open problems: derivation of r=√2 (Koide), Poisson distribution of A0
      transitions, and emergence of complex Hilbert space.
    why_status: |
      DEMONSTRATED conditional on axiom F (finite Z-graph), which follows from
      the Bekenstein-Hawking / Bousso covariant entropy bound: any finite
      spatial region has finite degrees of freedom. Three independent
      sub-results form the chain: (F) finiteness via holographic bound,
      (I) irreducibility via vertex-transitivity under I_Sym on a connected
      3-manifold, (A) aperiodicity via Z3 (odd-cycle, non-bipartite) plus
      monotonic Z_therm increase. Perron-Frobenius then gives the unique
      stationary distribution. A=3 from these three independent confirmation
      paths. Note: consequence (3) — complex Hilbert space — is STRONG not
      DEMONSTRATED, carried by the identification step L^2(L(3,1)) = physical
      Hilbert space; consequences (1) and (2) are full DEMONSTRATED given
      ergodicity.
    not_misinterpretations: |
      this is Boltzmann ergodicity of single-trajectory coverage (it is
      Jaynes ergodicity — convergence to maximum-entropy distribution on
      the accessible phase space, like water reaching hydrostatic
      equilibrium without every molecule visiting every point) ·
      complex Hilbert space follows from ergodicity alone (it follows
      from Z3 representation theory; ergodicity establishes the Gibbs
      state over which L^2 is defined, but the complex structure comes
      from the fact that Z3 has no irreducible real representation of
      degree 3) · real or quaternionic alternatives are possible for
      the Hilbert space on L(3,1) (the Z3 spectrum excludes them by
      character theory; complex coefficients are structurally necessary)

  - id: N067
    title: Spectral Dimension d_s(r) and the Half-Transition Scale
    layer: structure
    status: DEMONSTRATED
    anchors: 3
    a_infinity: false
    is_placeholder: false
    summary: |
      The spectral dimension d_s(r) = 2 + 2r/(r + r_0) follows uniquely from
      RG fixed-point analysis with η = 0 (exact for the linear A_0 operator).
      At the unique half-transition scale r_0, d_s(r_0) = 3. Three independent
      characterisations of r_0 coincide: (i) scale where d_s = 3, (ii) thermal
      de Broglie wavelength sqrt(ℏ²/m k_B T), (iii) impedance balance scale
      where Z_struct = Z_therm. Boundary conditions: d_s(0) = 2 (UV, Z₃ fibre
      freezing on Hopf base S²), d_s(∞) = 4 (IR, full L(3,1) × ℝ resolved).
    why_status: |
      DEMONSTRATED on three independent paths converging on the same formula.
      (1) Functional form: η = 0 is exact for A_0 = argmin Z (a linear
      selection operator with no higher-order interactions; Gaussian fixed
