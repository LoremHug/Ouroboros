  - id: N_GraphProperty_SmallWorldMotifFractality
    title: "Graph is Small-World with Motif-Fractality"
    layer: epistemics
    status: DEMONSTRATED
    anchors: 4
    a_infinity: false
    z_struct: 0.6
    z_therm: 0.05
    z_hidden: 0.35
    summary: |
      The framework graph exhibits two compatible properties
      simultaneously: (a) STRONGLY SMALL-WORLD geometry — high
      clustering with short paths, σ = (C/C_rand)/(L/L_rand) >> 1,
      (b) MOTIF-FRACTALITY — self-similarity at the level of
      structural motifs (M1 triangle density, M5 stratification
      recursion, β₁/V invariance under growth), not at the level
      of geometric distance (which would require power-law
      cluster growth N(r) ~ r^d; instead growth is exponential
      and saturates near diameter ~3).

      Fractality lives in MOTIF SUBSTRATE rather than distance
      substrate because forced-edge construction creates
      shortcuts through hubs. Per N_FractalSelfSimilarityAsArgminZ:
      when scale is hidden coord at the motif level (not at
      distance level), motif-substrate fractality is the forced
      solution.

      Live measurements available via fractal_audit() in
      mcp_server/motifs.py — current values supersede any cited
      historical values.
    why_status: |
      DEMONSTRATED via:
      (1) Direct measurement: fractal_audit() computes
        small-world coefficient σ, clustering ratio C/C_rand,
        path length L, cyclomatic ratio β₁/V, triangle density
        M1/V, degree distribution.
      (2) Stability under growth: σ remains in strongly-
        small-world regime; β₁/V remains in cycle-rich regime
        across all measured graph states. The invariance is the
        motif-fractality signature.
      (3) Compatibility with N_GraphProperty_2VertexConnectivity:
        small-world geometry is consistent with M4
        (only foundational principles N_Invariants and
        N_InversiveTheory are articulation points, isolating
        single leaves only).
      (4) Distinct from geometric fractality: cluster-growth
        N(r) saturates near r=3 (diameter); power-law fit fails.
        Geometric-fractal dim is undefined for small-world graphs.
        Motif-fractality is the forced regime here.
    content: |
      Operational measurement components:

        Cluster-growth N(r) per seed:
          For each seed, count nodes within r hops via BFS.
          On small-world graphs, saturates near diameter;
          power-law fit fails. The exponential growth is the
          small-world signature, not a defect.

        Clustering coefficient C and small-world coef σ:
          C = average local triangle density per node.
          C_rand = p (edge probability for ER baseline).
          σ = (C/C_rand) / (L/L_rand). σ >> 1 = strongly SW.

        Cyclomatic ratio β₁/V:
          β₁ = E - V + components (independent cycles).
          β₁/V tracks cycle-richness. Constant under growth =
          scale-invariance in graph substrate (motif-fractality
          signature).

        Triangle density M1/V:
          M1-motif instances per node; tracks Z-triangle
          pervasiveness.

        Twin pair count:
          M3 motif instances (Jaccard=1.0 pairs).

        Degree distribution + tail γ:
          P(k) ~ k^(-γ) tail fit. Pure scale-free regime
          gives γ in 1.5-3.5 with high R². Forced-edge
          construction does NOT produce pure scale-free
          (no preferential-attachment dynamics); tail typically
          shows mixed regime.

      Why motif-fractality, not geometric-fractality:
        Forced-edge construction (per N_FrameworkCore): each
        new node connects via multiple forced edges to existing
        structure. The forced edges include shortcuts through
        hubs (DEF, N370, N_NoSeparatePieces, etc., are highly
        connected by structural necessity). Shortcuts collapse
        diameter; diameter ≈ 3 means N(r) saturates fast for
        r ≥ 3. Power-law cluster-growth requires diameter
        scaling with V; small-world graphs have diameter
        scaling with log V. Geometric-fractal dim is therefore
        undefined.

        Meanwhile, the FORCED-EDGE protocol itself follows
        M1/M5 pattern recursively: each addition creates
        Z-triangle closures and may join existing K_n family-
        cliques. The motif structure is reproduced at every
        addition scale — fractal in motif substrate.

      Predicted regime stability:
        (P1) σ remains in strongly small-world regime as long
          as forced-edge protocol creates >= 2 connections per
          new node.
        (P2) β₁/V remains in cycle-rich regime as long as new
          edges close more cycles than they shortcut.
        (P3) Cluster-growth continues saturating fast; geometric-
          fractal dim remains undefined while diameter ≈ log V.
        (P4) M1/V grows roughly linearly with V (each new node
          adds bounded number of triangles).
        Regime shift signals (via fractal_audit measurement):
          σ falling toward random graph (~1) → small-world lost
          β₁/V falling below 2 → tree-like degeneration
          M1/V dropping → forced-edge closures failing
    level: 1
    is_placeholder: false


  - id: N_FractalSelfSimilarityAsArgminZ
