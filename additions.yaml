"""Post-migration additions: nodes and edges added during sessions.

This file is the source of truth for everything created via add_node.py /
add_edge.py. migrate.py applies it on top of the .txt parse.

Format:
    edges:
      - source: N_X
        target: N_Y
        label: snake_case_descriptor
        edge_status: D | S
        justification: |
          Why this connection holds, in plain text.
        why_forced: |
          What alternative is impossible and why.

    nodes:
      - id: N_NewNode
        title: ...
        layer: observers | structure | ...
        status: DEMONSTRATED | STRONG | CONDITIONAL | OPERATIONAL | STUB
        anchors: 3
        a_infinity: false
        summary: One-line CLAIM.
        why_status: Why this status holds.
        is_placeholder: false

Edits here are committed and become the canonical source of post-migration work.
"""

