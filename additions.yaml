    content: |
      Operational definitions:

        Induced cycle of length n: closed path v_1 → v_2 → ... →
          v_n → v_1 such that no chord (v_i, v_j) edge exists for
          |i - j| not in {1, n-1}. Equivalent: vertex-induced
          subgraph on {v_1, ..., v_n} is exactly the cycle C_n.

        Cyclomatic number β₁: number of independent cycles, computed
          as E - V + (number of connected components). For our
          single-component graph: β₁ = E - V + 1.

        Cycle-richness ratio β₁/V: dimensionless measure of how
          cycle-rich the graph is per node. Trees: 0. Cliques:
          K_n has β₁/V = (n-1)/2 - 1 ≈ n/2.

      Detection algorithm:
        For each length L in {4, 5, 6, 7}:
          For each start node:
            DFS depth-bounded by L
            On returning to start, verify no chord (induced cycle)
            Canonicalise via min-rotation+reflection
            Add to set
        Filter for substantive subset:
