      | Territory / described | physical | matter-energy fields,
        spatial-temporal structure |
      | Observer / BPI | cognitive | engagement, attention, qualia |

      The COORDINATES are BPI parsing; the SUBSTRATE-DIVISION is
      itself BPI parsing. There is no substrate-A separated from
      substrate-B at the level of A_0 operation. Different substrates
      are themselves coordinate readings of one substrate-uniform
