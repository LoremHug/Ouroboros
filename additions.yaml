      the cyclomatic number (independent cycles). Cycle-rich
      regime: β₁/V ≥ 2. The framework graph stays in this regime
      under construction.

      Striking structural fact: M1 forces LOCAL triadic closure
      around each parent, but does NOT automatically close
      long cycles via chords. Chordless cycles of length 5+
