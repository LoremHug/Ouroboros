      separations are observer-imposed labels on a unified process.

      When the map tracks the territory's structure via forced
      derivation (DEMONSTRATED), and the observer recognises that
      structure (BPI parsing), all three are co-instantiations of
      one A_0 — and the "three" itself is BPI parsing, not
