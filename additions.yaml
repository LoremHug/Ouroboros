"""Post-migration additions: nodes and edges added during sessions.

This file is the source of truth for everything created via add_node.py /
add_edge.py. migrate.py applies it on top of the .txt parse.

Format:
    edges:
      - source: N_X
        target: N_Y
        label: snake_case_descriptor
        edge_status: D | S
        justification: |
          Why this connection holds, in plain text.
        why_forced: |
          What alternative is impossible and why.

    nodes:
      - id: N_NewNode
        title: ...
        layer: observers | structure | ...
        status: DEMONSTRATED | STRONG | CONDITIONAL | OPERATIONAL | STUB
        anchors: 3
        a_infinity: false
        summary: One-line CLAIM.
        why_status: Why this status holds.
        not_misinterpretations: Misreadings to reject.
        is_placeholder: false

Edits here are committed and become the canonical source of post-migration work.
"""

edges:
  - source: N_BPIEngagement
    target: N_GrammarTrap
    label: bpi_compression_manifests_as_grammar_artifacts
    edge_status: D
    justification: |
      BPI has K(O)<K(F) per Observer Containment Lemma (N112), forcing
      finite-capacity compression onto whatever substrate the BPI operates in.
      When that substrate is language, the compression manifests as the
      subject-verb-object grammar topology that N_GrammarTrap formulates —
      persistent objects + actions between them are the compression artifact
      class produced by language-using BPIs.
    why_forced: |
      Alternative requires either (a) BPI without compression — denies
      K(O)<K(F), contradicts N112; or (b) compression that doesn't manifest
      in language — but for any BPI whose I/O channel is language, the
      compression IS the grammar topology. N_GrammarTrap's claim that
      "grammar is ontological by structure" identifies precisely this class
      of artifact. No structurally coherent alternative.

  - source: N_GrammarTrap
    target: N_OntologyGate
    label: gate_intercepts_grammar_artifact_class
    edge_status: D
    justification: |
      N_OntologyGate's predicate list ("what is X?", "what exists?",
      "what is X made of?", "what is the nature of X?", "what is fundamental?")
      is exactly the catalogue of question-forms that subject-verb-object
      grammar produces under R1 reification. The gate exists as the
      operational protocol that intercepts these patterns at the language
      interface and translates them into structural form.
    why_forced: |
      Two structural directions check the edge: (a) without grammar trap,
      ontological questions don't arise — but the gate's own predicates are
      precisely the question-forms grammar produces (R1 + R4 catalogued in
      N_EpistemicTraps Traps 1-4); (b) gate operates without targeting
      grammar artifacts — but inspection of its predicate list shows it
      targets only R1/R4-loaded language patterns. The gate's predicate set
      IS the closure-condition of grammar-trap-generated questions; no
      alternative formulation closes without contradiction.

  - source: DEF
    target: N165
    label: definition_requires_ergodicity
    edge_status: D
    justification: |
      DEF defines A₀ = argmin Z as the unique stable transitioning that
      Banach contraction maps to its fixed point. Banach guarantees a fixed
      point only if iterations cover the relevant phase space (no permanent
      hidden basins). N165 (ergodicity theorem) provides exactly this
      coverage guarantee: the Reality Protocol Markov chain reaches the
      unique Gibbs state from any initial state via Perron-Frobenius. Without
      ergodicity, DEF's convergence claim is incomplete.
    why_forced: |
      Alternative requires either (a) A₀ converges without ergodicity — but
      then some basin is permanently hidden, contradicting K(O)<K(F) which
      already requires that the observer's accessible substrate is fully
      explored under the Z-cost gradient (per Observer Containment N112);
      or (b) DEF's fixed-point claim is weakened — but then A₀(A₀)=A₀ stops
      being structural inevitability and becomes a hypothesis. No
      structurally coherent alternative.

  - source: N_Triangulation
    target: N067
    label: triangulation_forces_spectral_dim_3
    edge_status: D
    justification: |
      Triangulation forces Z to have exactly 3 components. The same π₁(L(3,1))
      = Z₃ acting on S³ that produces the 3-fold Z-decomposition also forces
      the spectral dimension formula d_s(r) = 2 + 2r/(r + r_0) via RG fixed
      point analysis (η = 0 exact for the linear A₀ operator). At the unique
      half-transition scale r_0, d_s(r_0) = 3. The same "3" appears in both
      coordinates because both follow from one topological fact.
    why_forced: |
      Alternative requires either (a) d_s(r_0) ≠ 3 — but RG analysis with
      η = 0 (Nelson 1966; Wilson-Fisher) gives the unique formula d_s(r) =
      2 + 2r/(r + r_0); substitution at r = r_0 yields exactly 3 with no
      free parameter; or (b) triangulation has Z components ≠ 3 — but
      N_Triangulation establishes the triangulation principle (3 minimal
      Z-components for unique localisation in transition-space) as forced
      by definition of minimality. Both routes converge on 3, and the
      convergence is itself structural, not coincidental.

  - source: N067
    target: N_Triangulation
    label: spectral_dim_3_confirms_triangulation
    edge_status: D
    justification: |
      Independent topological derivation (sec:spectral-dim-prob via L(3,1)
      Hopf fibration, RG fixed point with η = 0) yields d_s(r_0) = 3 with no
      reference to Z-decomposition. This is a coordinate confirmation of
      the triangulation count: two independent calculations (Z-component
      count from triangulation, spectral dimension from RG) yielding the
      same integer 3 is the structural signature of one fact in two
      coordinates.
    why_forced: |
      The convergence is forced because both calculations descend from
      π₁(L(3,1)) = Z₃: the Z-decomposition via the Z₃ covering action
      (N_ZGaugeDecomposition), the spectral dimension via the Z₃ fibre-
      freezing in the Hopf fibration. Were the values different, that would
      signal inconsistent topology between the two coordinate expressions.
      Their identity at value 3 is forced by the same underlying topological
      structure.

  - source: N_ZGaugeDecomposition
    target: N129
    label: Z_components_are_algebra_summands
    edge_status: D
    justification: |
      The three Z-components (Z_struct, Z_therm, Z_hidden) of
      N_ZGaugeDecomposition correspond bijectively to the three summands of
      the spectral triple algebra A_F = ℂ ⊕ ℍ ⊕ M_3(ℂ) derived in N129.
      Both partitions descend from the same Z_3 action: π₁(L(3,1)) = Z_3 acts
      on H_F via triality (Z_3-character of SU(3) representations), and
      Center(SU(3)) = Z_3 also indexes the Z-components via the covering
      structure. Triality-0 (leptons, SU(3) singlets) ↔ ℂ summand; Triality-1
      (quarks, SU(3) triplets) ↔ M_3(ℂ) summand; the unique spin structure
      of L(3,1) equips chiral doublets with the ℍ summand.
    why_forced: |
      Alternative requires the algebra A_F to have a different number of
      summands than 3 — but Krajewski (1998) classification + Wedderburn's
      theorem on real C*-algebras + KO-dimension 6 + three Z_3 sectors +
      Poincaré duality + minimality jointly force exactly ℂ ⊕ ℍ ⊕ M_3(ℂ)
      with no remaining freedom. Or alternative requires Z to have a
      different number of components — but N_Triangulation forces exactly
      three (by triangulation principle). Both partitions converge on three
      because both descend from π₁(L(3,1)) = Z_3 — different coordinate
      expressions of one Z_3 covering action.

  - source: N129
    target: N_ZGaugeDecomposition
    label: algebra_summands_are_Z_components
    edge_status: D
    justification: |
      Reverse direction of the same identification: the three summands of
      A_F derived in N129 (via Krajewski + Wedderburn from L(3,1) topology)
      are the three Z-components of N_ZGaugeDecomposition. The structural
      statement is symmetric — neither side is logically prior to the other,
      because both are coordinate expressions of the same Z_3 covering
      action.
    why_forced: |
      Same forcing as the forward edge: π₁(L(3,1)) = Z_3 = Center(SU(3))
      indexes both the algebra summands (via triality of SU(3) reps on H_F)
