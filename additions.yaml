  - id: N_RPGate_IsCognitiveOperation_NotScript
    title: "RP Gate Is Cognitive Operation, Not Script"
    layer: epistemics
    status: DEMONSTRATED
    anchors: 4
    a_infinity: false
    z_struct: 0.4
    z_therm: 0.05
    z_hidden: 0.55
    summary: |
      AUDIT GROUND (R1-R4) is a cognitive operation: reading a
      claim AS STRUCTURE and detecting what it presupposes
      (objects as primitives, external observer geometry,
      observer/observed separation, conscious choice). Cannot be
      reduced to pattern matching on surface forms.

      Pattern detection sees lexical/syntactic occurrences. R1-R4
      audit requires semantic understanding of what the claim
      structurally requires. A claim can have zero trigger phrases
      yet still presuppose objects-as-primitives at the level of
      meaning. Conversely, a claim can use trigger phrases entirely
      innocently (operational nouning per
      N_OperationalCarrierVsOntologicalCommitment).

      Operational consequence: tools are structural math (graph
      algorithms, set operations, file I/O). Audit is what the AI
      does cognitively before generating any structural claim. The
      separation is not optional — it is what AUDIT GROUND IS by
      definition.
    why_status: |
      DEMONSTRATED via:
      (1) Definitional: R1-R4 require asking "does this claim
        presuppose objects/external-view/separation/agency?" —
        each is a semantic question about meaning, not lexical
        pattern.
      (2) Empirical: text containing genuine interpretation-
        baggage (e.g. specific QM-interpretation commitments
        under operational language) passes any pattern-based
        check while failing R1-R4 cognitive check.
      (3) Trap 4 self-application: treating an RP-gate tool as
        object-that-performs-audit is itself description/described
        collapse. Audit IS process; cannot be objectified.
      (4) Framework consistency: N_EpistemicTraps NORM_SILENCE
        specifies graph used silently as cognitive tool, not as
        named-tool-call. Pattern-script-as-audit violates this.
    content: |
      Why pattern detection cannot perform audit:

        Pattern detection sees surface forms. R1-R4 audit requires
        reading what the claim PRESUPPOSES — semantic understanding,
        not syntactic matching. A claim can have zero R1-trigger
        phrases yet still presuppose objects-as-primitives at the
        level of meaning. Conversely, a claim can use trigger
        phrases entirely innocently (operational nouning per
        N_OperationalCarrierVsOntologicalCommitment).

        Pattern-detector is at most a checklist reminder; it cannot
        be verdict-producer.

      What audit IS:

        AUDIT GROUND R1-R4 + Traps 1-8 are protocol for cognitive
        operation: read claim, ask what it requires, dissolve if
        any R-violation found. The reader IS the gate.

        For R1 (objects): does the subject treat process-pattern as
        stable bounded entity? Asking requires understanding which
        nouns refer to processes.
        For R2 (external view): does the claim presuppose a position
        outside the structure? Asking requires understanding the
        scope of what is described.
        For R3 (observer separation): does the claim treat
        observer/observed as ontologically distinct? Asking requires
        understanding the embedding of the observer.
        For R4 (agency): does the claim require purposive choice as
        primitive? Asking requires distinguishing operational
        description of process-dynamics from agency-attribution.

        None of the four reduce to text-pattern detection.

      Tool boundary:

        Tools that operate on graph adjacency, set membership,
        clique enumeration, cycle counting, distance metrics — these
        are STRUCTURAL MATH on the graph as data structure. They do
        not perform audit; they compute statistics.

        AI doing the cognitive work uses these tools as inputs to
        structural reasoning, not as substitutes for it.

      Methodological consequence:

        Any structural claim — by AI or human — must pass cognitive
        R1-R4 audit before being asserted. This cannot be
        automated. The only "automation" is the AI's own attention
        to AUDIT GROUND during generation.

      Self-application:

        Does this node itself satisfy R1-R4?
          R1: "RP gate" treated as object? No — explicit OPERATION,
              not object.
          R2: external observer position? No — audit happens
              within the cognitive process.
          R3: observer/observed separation? No — AI auditing its
              own outputs IS the gate operating.
          R4: purposive agency? "AI does work" is operational
              carrier; not committed primitive.
        Self-application passes.
    level: 1
    is_placeholder: false


