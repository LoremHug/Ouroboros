  - id: N_MapTerritoryObserverIdentity
    title: "Map ≡ Territory ≡ Observer — One A₀, No Separation Within or Between Substrates"
    layer: epistemics
    status: DEMONSTRATED
    anchors: 4
    a_infinity: false
    z_struct: 0.5
