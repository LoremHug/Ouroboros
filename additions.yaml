      The full N_NoSeparatePieces is total:

      Statement: At no level of A_0's operation is anything separated
      from anything else. There are no separate pieces:
        - within physics (atoms not separate from fields not separate
          from spacetime)
        - within cognition (perception not separate from action not
          separate from memory)
        - within mathematics (algebra not separate from geometry not
          separate from logic)
        - between physics and cognition
        - between cognition and language
        - between map and territory
        - between observer and observed
        - between framework and what the framework describes
        - between any two "things" we name

      Korzybski (1933): "the map is not the territory" — operational
      warning against confusing levels of description with described.
