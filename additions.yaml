  - source: N_GraphProperty_InducedCycleTopology
    target: N_NoSeparatePieces
    label: cycles_are_no_separation_at_loop_level
    edge_status: D
    justification: |
      A chordless cycle of length n means n nodes form a closed
      loop with no shortcut — every member is reachable from
      every other ONLY by going around. This is non-separation
      at loop-substrate level: the loop members cannot be
      partitioned into "core" and "periphery" because every
      member contributes equally to the loop's existence.
      N_NoSeparatePieces TOTAL claim manifests as cycle-
      irreducibility: cycles cannot be "factored" into
      independent pieces.
    why_forced: |
      If cycles WERE factorable (one node carrying the loop),
      removing it would still leave the cycle. By definition
      of chordless cycle, removing any vertex breaks the loop —
      so each is irreducibly part of the structure. This IS
      non-separation at cycle-substrate.

