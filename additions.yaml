    summary: |
      Z_therm decomposes internally into two factors that conflate
      under naive reading: per-transition cost (magnitude, scales
      with T) and transition rate (frequency, bits-erased per unit
      time). Total dissipation power is their PRODUCT:
        dW/dt ≈ ν · ΔK · k_B T ln 2
      where ν = transition rate, ΔK = bits per transition (complexity),
      k_B T ln 2 = thermal scale. "Speed" in dissipative-substrate
      reasoning is precisely this transition frequency ν.

      Crystal and plasma are opposite poles on the rate axis:
        - Crystal: very low ν (slow lattice rearrangement) ×
          moderate ΔK × moderate T → very low dW/dt
        - Plasma: very high ν (constant E&M reconfiguration) ×
          moderate-high ΔK × high T → very high dW/dt
      Their structural difference is primarily on the rate axis,
      not the complexity axis (both have substantial structure).
    why_status: |
      DEMONSTRATED via:
      (1) Arrhenius equation k = ν₀ · exp(-ΔG‡/kT): explicit
        rate-magnitude factorisation in chemistry (per N029).
      (2) Eyring equation k = (k_B T/h) · exp(-ΔG‡/kT): same
        decomposition with Boltzmann pre-factor.
      (3) Empirical substrate ordering (crystal → solid → liquid →
        gas → plasma) is primarily a rate-axis ordering at
        approximately constant per-event complexity.
      (4) KMS modular time σ^t supplies the formal Z_therm rate
        axis at QFT level (N362).

      Status DEMONSTRATED rather than STRONG because the two-factor
      decomposition is mathematically forced by trajectory argmin —
      no empirical fitting required.
    content: |
      Mathematical form:
        Power dissipated = ν · ΔK · k_B T ln 2
        where:
          ν   = transition rate (Hz, bits-erased per unit time)
          ΔK  = bits per transition (Kolmogorov complexity ≡ Z_struct)
          T   = temperature (Z_therm scale)

      Substrate map (rate axis):
        Crystal (low T, deep wells): ν ≈ 10^(-10) Hz at room T
        Solid bulk: ν ≈ 10^0 - 10^3 Hz
        Liquid: ν ≈ 10^9 - 10^12 Hz (molecular reorientation)
        Gas: ν ≈ 10^12 Hz (collision rate)
        Plasma: ν ≈ 10^15+ Hz (E&M reconfiguration, ionisation flips)
        Neural cortex: ν ≈ 10^4 Hz (synaptic events) at vastly
          higher per-event complexity than gas

      Crystal vs plasma comparison:
        Both have non-trivial Z_struct content (lattice vs collective
        E&M state). They differ primarily in ν:
          - Crystal: ν ≈ 0 (lattice fixed for years)
          - Plasma: ν → maximum substrate allows
        Z_therm magnitude comparable (per-event cost similar order).
        So total dW/dt differs by 25 orders of magnitude — driven
        almost entirely by rate axis.

      Connection to N_ComplexityAsDissipationPath:
