        substrate. This node says: complexity alone does not determine
        dissipation rate — rate is the orthogonal axis. The full
        picture: A_0 favours configurations that BUILD COMPLEXITY
        AT HIGH RATE in throughput substrates. Brain ≫ ecosystem ≫
        crystal because brain has high complexity AND high rate.

      Connection to Arrhenius/Eyring (N029):
        The pre-factor ν₀ is the rate axis at the per-reaction level.
        ΔG‡ is the magnitude. Their product — exp(-ΔG‡/kT) modulating
        ν₀ — is the rate-magnitude decomposition realised in chemistry.

      Connection to BPI hydrodynamics (N371):
        Laminar regime = low ν, organised Z-flow. Turbulent regime
        = high ν, chaotic Z-flow. The Reynolds analogy works because
        rate is the relevant axis. Cognitive engagement at Wundt apex
